services:
  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs-server
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - RUSTFS_VOLUMES=/data
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY}
    volumes:
      - /srv/dev-disk-by-uuid-81aeb123-75b6-4659-9e3a-172bc10b62cd/trustnas-test/:/data
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:latest
    container_name: trustnas-tailscale
    hostname: trustnas
    ports:
      - "8334:8334"
      - "3000:3000"
      - "63778:80"
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    network_mode: "service:tailscale"
    depends_on:
      - tailscale
    volumes:
      - /home/openmediavault/gitsource/trustnas/homepage/:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      HOMEPAGE_ALLOWED_HOSTS: localhost,127.0.0.1,openmediavault,openmediavault:3000
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: p2p-nginx
    network_mode: "service:tailscale"
    depends_on:
      - tailscale
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./s3browser/:/usr/share/nginx/html/s3ui:ro
      - ./nginx_logs:/var/log/nginx
    restart: unless-stopped

volumes:
  tailscale-state:
