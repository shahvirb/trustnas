services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: trustnas-tailscale
    hostname: ${TAILSCALE_HOSTNAME:-trustnas}
    ports:
      - "${TAILSCALE_HTTPS_PORT:-8334}:8334"
      - "${HOMEPAGE_PORT:-3000}:3000"
      - "${NGINX_PUBLIC_PORT:-63778}:80"
      - "${NGINX_GARAGE_PORT:-63779}:81"
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - ${TAILSCALE_STATE_PATH:-./docker-data/tailscale}:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    network_mode: "service:tailscale"
    depends_on:
      - tailscale
    volumes:
      - ./homepage/:/app/config
      - ${HOMEPAGE_LOGS_PATH:-./docker-data/homepage/logs}:/app/config/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS:-localhost,127.0.0.1,openmediavault,openmediavault:3000,trustnas:3000}
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: p2p-nginx
    network_mode: "service:tailscale"
    depends_on:
      - tailscale
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./s3browser/:/usr/share/nginx/html/s3ui:ro
      - ${NGINX_LOGS_PATH:-./docker-data/nginx_logs}:/var/log/nginx
    environment:
      - NGINX_BANDWIDTH_LIMIT=${NGINX_BANDWIDTH_LIMIT:-6250k}
      - NGINX_WORKER_CONNECTIONS=${NGINX_WORKER_CONNECTIONS:-1024}
      - NGINX_CLIENT_MAX_BODY_SIZE=${NGINX_CLIENT_MAX_BODY_SIZE:-0}
    command: >
      /bin/sh -c "
        apk add --no-cache gettext > /dev/null 2>&1 &&
        envsubst '
          $$NGINX_BANDWIDTH_LIMIT
          $$NGINX_WORKER_CONNECTIONS
          $$NGINX_CLIENT_MAX_BODY_SIZE
        ' < /etc/nginx/templates/nginx.conf.template > /etc/nginx/nginx.conf &&
        nginx -g 'daemon off;'
      "
    restart: unless-stopped

  garage-init:
    image: alpine:latest
    container_name: garage-config-init
    volumes:
      - ${GARAGE_CONFIG_PATH:-./docker-data/garage/config}:/etc/garage
      - ./garage.toml.template:/tmp/garage.toml.template:ro
    environment:
      - GARAGE_RPC_SECRET=${GARAGE_RPC_SECRET}
    command: >
      sh -c "apk add --no-cache gettext > /dev/null 2>&1 &&
        envsubst < /tmp/garage.toml.template > /etc/garage/garage.toml &&
        echo 'Garage config written'"

  garage:
    image: dxflrs/garage:v2.3.0
    container_name: garage-server
    depends_on:
      garage-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${GARAGE_S3_PORT:-3900}:3900"
    volumes:
      - ${GARAGE_DATA_PATH:-./docker-data/garage/data}:/var/lib/garage
      - ${GARAGE_CONFIG_PATH:-./docker-data/garage/config}:/etc/garage:ro
    command: /garage -c /etc/garage/garage.toml server
    restart: unless-stopped

