- Monitoring:
    - Dozzle:
        icon: mdi-docker
        href: http://trustnas:8379
        description: Real-time Docker container log viewer. Monitor all container logs through a clean web UI.
        container: dozzle

- Tools:
    - Filestash:
        icon: mdi-file-cloud-outline
        href: http://trustnas:8378
        description: Web-based file manager for S3 storage. Browse, upload, download, and manage files via Tailscale VPN.
        container: filestash
    - S3 Browser:
        icon: mdi-folder-open-outline
        href: http://trustnas/s3ui/
        description: Client-side S3 bucket browser. Login with your S3 access key and secret key to browse and download files from your buckets.
        container: p2p-nginx

- Bandwidth Limiting:
    - S3 Gateway:
        icon: si-nginx
        href: https://trustnas:63778
        description: Bandwidth-limited S3 reverse proxy (50 Mbps / 6.1 MB/s cap). Routes S3 traffic via Tailscale → Garage.
        container: p2p-nginx
    - S3 Bandwidth Benchmark:
        icon: mdi-speedometer
        href: http://p2p-nginx:80
        description: "Script that uploads 5 MB + 50 MB test files then downloads them through nginx to verify the rate limit. Run: `uv run scripts/s3_bench.py`."

- Storage Engine:
    - Garage S3 API:
        icon: si-amazons3
        href: http://garage-server:3900
        description: S3-compatible distributed object storage. Lightweight, single-binary, geo-replicated. No web console.
        container: garage-server
    - Garage Admin API:
        icon: mdi-wrench
        href: http://garage-server:3901/v1/health
        description: Garage admin and health endpoint. Managed via CLI (docker exec garage-server /garage ...).
