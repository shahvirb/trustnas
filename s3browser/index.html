<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S3 Browser</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  min-height: 100vh;
}

.login-panel {
  max-width: 420px;
  margin: 80px auto 0;
  background: #1e293b;
  border-radius: 12px;
  padding: 32px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
}
.login-panel h1 { font-size: 1.5rem; margin-bottom: 4px; }
.login-panel .subtitle { color: #94a3b8; font-size: 0.875rem; margin-bottom: 24px; }

.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 0.8125rem; color: #94a3b8; margin-bottom: 4px; }
.form-group input {
  width: 100%;
  padding: 10px 12px;
  background: #0f172a;
  border: 1px solid #334155;
  border-radius: 6px;
  color: #e2e8f0;
  font-size: 0.875rem;
  outline: none;
  transition: border-color 0.15s;
}
.form-group input:focus { border-color: #3b82f6; }
.form-group input::placeholder { color: #475569; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 20px;
  border-radius: 6px; font-size: 0.875rem; font-weight: 500;
  cursor: pointer; border: none; transition: background 0.15s;
}
.btn-primary { background: #3b82f6; color: #fff; width: 100%; }
.btn-primary:hover { background: #2563eb; }
.btn-primary:disabled { background: #1e3a5f; color: #64748b; cursor: not-allowed; }
.btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #334155; }
.btn-ghost:hover { background: #1e293b; color: #e2e8f0; }
.btn-danger { background: transparent; color: #f87171; border: 1px solid #7f1d1d; }
.btn-danger:hover { background: #7f1d1d; }

.error-msg {
  background: #7f1d1d; color: #fca5a5; padding: 10px 14px;
  border-radius: 6px; font-size: 0.8125rem; margin-bottom: 16px; display: none;
}
.error-msg.visible { display: block; }

.browser { max-width: 1100px; margin: 0 auto; padding: 20px; display: none; }
.browser.visible { display: block; }

.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; background: #1e293b; border-radius: 10px;
  margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
}
.topbar-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
.breadcrumb { display: flex; align-items: center; gap: 4px; overflow: hidden; }
.breadcrumb a, .breadcrumb span {
  color: #94a3b8; text-decoration: none; font-size: 0.875rem;
  white-space: nowrap; padding: 4px 6px; border-radius: 4px;
}
.breadcrumb a:hover { color: #e2e8f0; background: #334155; }
.breadcrumb .sep { color: #475569; padding: 0 2px; }
.breadcrumb .current { color: #e2e8f0; font-weight: 600; }

.topbar-right { display: flex; align-items: center; gap: 8px; }
.status { font-size: 0.75rem; color: #64748b; }
.status.connected { color: #4ade80; }

.table-wrap { background: #1e293b; border-radius: 10px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left; padding: 10px 16px; font-size: 0.75rem; color: #64748b;
  text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
}
td { padding: 10px 16px; font-size: 0.875rem; border-top: 1px solid #1e293b; }
tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
tr:hover td { background: rgba(59,130,246,0.08); }
tr.clickable { cursor: pointer; }

td.name { display: flex; align-items: center; gap: 10px; }
td.name .icon { width: 20px; text-align: center; flex-shrink: 0; }
td.name a { color: #e2e8f0; text-decoration: none; }
td.name a:hover { color: #3b82f6; text-decoration: underline; }
td.name .folder-name { color: #60a5fa; }
td.size { color: #94a3b8; white-space: nowrap; text-align: right; }
td.date { color: #64748b; white-space: nowrap; }

.empty { padding: 48px; text-align: center; color: #64748b; font-size: 0.875rem; }

.loading { padding: 48px; text-align: center; }
.spinner {
  width: 28px; height: 28px; border: 3px solid #334155;
  border-top-color: #3b82f6; border-radius: 50%;
  display: inline-block; animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.endpoint-hint { font-size: 0.75rem; color: #64748b; margin-top: 4px; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div id="login-panel" class="login-panel">
  <h1>S3 Browser</h1>
  <p class="subtitle">Connect to your S3 storage</p>

  <div id="login-error" class="error-msg"></div>

  <div class="form-group">
    <label for="endpoint">Endpoint</label>
    <input type="text" id="endpoint" placeholder="http://trustnas:63778">
    <div class="endpoint-hint">S3-compatible endpoint URL</div>
  </div>

  <div class="form-group">
    <label for="region">Region</label>
    <input type="text" id="region" value="us-east-1" placeholder="us-east-1">
  </div>

  <div class="form-group">
    <label for="accessKey">Access Key</label>
    <input type="text" id="accessKey" placeholder="Your access key">
  </div>

  <div class="form-group">
    <label for="secretKey">Secret Key</label>
    <input type="password" id="secretKey" placeholder="Your secret key">
  </div>

  <button id="connect-btn" class="btn btn-primary" onclick="connect()">Connect</button>
</div>

<div id="browser" class="browser">
  <div class="topbar">
    <div class="topbar-left">
      <div class="breadcrumb" id="breadcrumb">
        <a href="#" onclick="showBuckets()">Buckets</a>
      </div>
    </div>
    <div class="topbar-right">
      <span class="status" id="status"></span>
      <button class="btn btn-ghost" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="table-wrap" id="table-container">
    <div id="loading-indicator" class="loading hidden">
      <div class="spinner"></div>
    </div>
    <table id="objects-table" class="hidden">
      <thead>
        <tr>
          <th>Name</th>
          <th style="text-align:right">Size</th>
          <th>Modified</th>
        </tr>
      </thead>
      <tbody id="objects-tbody"></tbody>
    </table>
    <div id="empty-state" class="empty hidden">This bucket is empty</div>
  </div>
</div>

<script>
var encoder = new TextEncoder();
var emptyHash = 'e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855';

function toHex(buf) {
  return Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
}

function hmacRaw(key, data) {
  return crypto.subtle.importKey('raw', key, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign'])
    .then(function(ck) { return crypto.subtle.sign('HMAC', ck, data); })
    .then(function(buf) { return new Uint8Array(buf); });
}

function sha256Raw(data) {
  return crypto.subtle.digest('SHA-256', data).then(function(buf) { return new Uint8Array(buf); });
}

function deriveSigningKey(secretKey, date, region, service) {
  return hmacRaw(encoder.encode('AWS4' + secretKey), encoder.encode(date))
    .then(function(kDate) { return hmacRaw(kDate, encoder.encode(region)); })
    .then(function(kRegion) { return hmacRaw(kRegion, encoder.encode(service)); })
    .then(function(kService) { return hmacRaw(kService, encoder.encode('aws4_request')); });
}

function signAndFetch(method, path, query) {
  var host = new URL(state.endpoint).host;
  var now = new Date();
  var amzDate = now.toISOString().replace(/[:-]/g, '').replace(/\.[0-9]+/, '') + 'Z';
  var dateStamp = amzDate.slice(0, 8);

  var headers = {};
  headers['x-amz-date'] = amzDate;
  headers['x-amz-content-sha256'] = emptyHash;

  var q = query || {};
  var sortedQuery = Object.keys(q).sort().map(function(k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(q[k]);
  }).join('&');

  var signedHeaderKeys = ['host', 'x-amz-content-sha256', 'x-amz-date'];
  var canonicalHeaders = signedHeaderKeys.map(function(h) {
    return h + ':' + (h === 'host' ? host : headers[h]);
  }).join('\n');

  var canonicalRequest = [
    method,
    path,
    sortedQuery,
    canonicalHeaders + '\n',
    signedHeaderKeys.join(';'),
    emptyHash
  ].join('\n');

  return sha256Raw(encoder.encode(canonicalRequest)).then(function(crHash) {
    var credentialScope = dateStamp + '/' + state.region + '/s3/aws4_request';
    var stringToSign = [
      'AWS4-HMAC-SHA256',
      amzDate,
      credentialScope,
      toHex(crHash)
    ].join('\n');

    return deriveSigningKey(state.secretKey, dateStamp, state.region, 's3')
      .then(function(sk) { return hmacRaw(sk, encoder.encode(stringToSign)); })
      .then(function(sig) { return toHex(sig); })
      .then(function(signature) {
        headers['Authorization'] =
          'AWS4-HMAC-SHA256 Credential=' + state.accessKey + '/' + credentialScope +
          ', SignedHeaders=' + signedHeaderKeys.join(';') +
          ', Signature=' + signature;

        var qs = sortedQuery ? '?' + sortedQuery : '';
        var url = state.endpoint.replace(/\/+$/, '') + path + qs;
        return fetch(url, { method: method, headers: headers });
      });
  });
}

function presignedUrl(bucket, key, expires) {
  var host = new URL(state.endpoint).host;
  var now = new Date();
  var amzDate = now.toISOString().replace(/[:-]/g, '').replace(/\.[0-9]+/, '') + 'Z';
  var dateStamp = amzDate.slice(0, 8);
  var credentialScope = dateStamp + '/' + state.region + '/s3/aws4_request';

  var params = {
    'X-Amz-Algorithm': 'AWS4-HMAC-SHA256',
    'X-Amz-Credential': state.accessKey + '/' + credentialScope,
    'X-Amz-Date': amzDate,
    'X-Amz-Expires': String(expires),
    'X-Amz-SignedHeaders': 'host'
  };

  var sortedQuery = Object.keys(params).sort().map(function(k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
  }).join('&');

  var objectPath = '/' + bucket + '/' + encodeURIComponent(key).replace(/%2F/g, '/');

  var canonicalRequest = [
    'GET',
    objectPath,
    sortedQuery,
    'host:' + host + '\n',
    'host',
    'UNSIGNED-PAYLOAD'
  ].join('\n');

  return sha256Raw(encoder.encode(canonicalRequest)).then(function(crHash) {
    var stringToSign = [
      'AWS4-HMAC-SHA256',
      amzDate,
      credentialScope,
      toHex(crHash)
    ].join('\n');

    return deriveSigningKey(state.secretKey, dateStamp, state.region, 's3')
      .then(function(sk) { return hmacRaw(sk, encoder.encode(stringToSign)); })
      .then(function(sig) { return toHex(sig); })
      .then(function(signature) {
        var allParams = {};
        Object.keys(params).forEach(function(k) { allParams[k] = params[k]; });
        allParams['X-Amz-Signature'] = signature;
        var qs = Object.keys(allParams).sort().map(function(k) {
          return encodeURIComponent(k) + '=' + encodeURIComponent(allParams[k]);
        }).join('&');
        return state.endpoint.replace(/\/+$/, '') + objectPath + '?' + qs;
      });
  });
}

function parseListBucketsXML(xml) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  const ns = 'http://s3.amazonaws.com/doc/2006-03-01/';
  const buckets = doc.getElementsByTagNameNS(ns, 'Bucket');
  const result = [];
  for (const b of buckets) {
    const name = b.getElementsByTagNameNS(ns, 'Name')[0]?.textContent;
    const date = b.getElementsByTagNameNS(ns, 'CreationDate')[0]?.textContent;
    if (name) result.push({ name, date });
  }
  return result;
}

function parseListObjectsXML(xml) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  const ns = 'http://s3.amazonaws.com/doc/2006-03-01/';
  const folders = [];
  const files = [];

  const prefixes = doc.getElementsByTagNameNS(ns, 'CommonPrefixes');
  for (const p of prefixes) {
    const prefix = p.getElementsByTagNameNS(ns, 'Prefix')[0]?.textContent;
    if (prefix) folders.push(prefix);
  }

  const contents = doc.getElementsByTagNameNS(ns, 'Contents');
  for (const c of contents) {
    const key = c.getElementsByTagNameNS(ns, 'Key')[0]?.textContent;
    const size = c.getElementsByTagNameNS(ns, 'Size')[0]?.textContent;
    const modified = c.getElementsByTagNameNS(ns, 'LastModified')[0]?.textContent;
    if (key) files.push({ key, size: parseInt(size) || 0, modified });
  }

  return { folders, files };
}

const state = { endpoint: '', accessKey: '', secretKey: '', region: 'us-east-1', bucket: '', prefix: '' };

function loadState() {
  try {
    const saved = localStorage.getItem('s3browser');
    if (saved) Object.assign(state, JSON.parse(saved));
  } catch (e) { /* ignore */ }
}

function saveState() {
  localStorage.setItem('s3browser', JSON.stringify({
    endpoint: state.endpoint, accessKey: state.accessKey,
    secretKey: state.secretKey, region: state.region, bucket: state.bucket, prefix: state.prefix
  }));
}

function $(id) { return document.getElementById(id); }

function showError(msg) {
  const el = $('login-error');
  el.textContent = msg;
  el.classList.add('visible');
}

function hideError() {
  $('login-error').classList.remove('visible');
}

function showLoading() {
  $('loading-indicator').classList.remove('hidden');
  $('objects-table').classList.add('hidden');
  $('empty-state').classList.add('hidden');
}

function hideLoading() {
  $('loading-indicator').classList.add('hidden');
}

function showEmpty() {
  $('objects-table').classList.add('hidden');
  $('empty-state').classList.remove('hidden');
}

function formatSize(bytes) {
  if (bytes === 0) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  const i = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
  return (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
}

function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleString();
}

function folderIcon() { return '\u{1F4C1}'; }
function fileIcon(key) {
  const ext = (key || '').split('.').pop().toLowerCase();
  const icons = {
    pdf: '\u{1F4C4}', png: '\u{1F5BC}', jpg: '\u{1F5BC}', jpeg: '\u{1F5BC}',
    gif: '\u{1F5BC}', svg: '\u{1F5BC}', webp: '\u{1F5BC}',
    mp4: '\u{1F3AC}', avi: '\u{1F3AC}', mov: '\u{1F3AC}', mkv: '\u{1F3AC}',
    mp3: '\u{1F3B5}', wav: '\u{1F3B5}', flac: '\u{1F3B5}',
    zip: '\u{1F4E6}', tar: '\u{1F4E6}', gz: '\u{1F4E6}', rar: '\u{1F4E6}',
    txt: '\u{1F4C4}', md: '\u{1F4C4}', json: '\u{1F4C4}', xml: '\u{1F4C4}',
    js: '\u{1F4BB}', ts: '\u{1F4BB}', py: '\u{1F4BB}', rs: '\u{1F4BB}',
    html: '\u{1F310}', css: '\u{1F310}'
  };
  return icons[ext] || '\u{1F4CE}';
}

function renderBreadcrumb() {
  const bc = $('breadcrumb');
  bc.innerHTML = '<a href="#" onclick="showBuckets()">Buckets</a>';
  if (state.bucket) {
    const parts = state.prefix.replace(/\/$/, '').split('/').filter(Boolean);
    let path = '';
    for (const p of parts) {
      path += p + '/';
      bc.innerHTML += '<span class="sep">/</span><a href="#" onclick="navigatePrefix(\'' +
        encodeURIComponent(path) + '\')">' + escapeHtml(p) + '</a>';
    }
    bc.innerHTML += '<span class="sep">/</span><span class="current">' +
      escapeHtml(state.bucket) + (parts.length ? '/' + parts.join('/') + '/' : '') + '</span>';
  }
  document.title = state.bucket ? state.bucket + (state.prefix ? '/' + state.prefix : '') + ' - S3 Browser' : 'S3 Browser';
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function connect() {
  hideError();
  const btn = $('connect-btn');

  state.endpoint = $('endpoint').value.trim() || window.location.origin;
  state.region = $('region').value.trim() || 'us-east-1';
  state.accessKey = $('accessKey').value.trim();
  state.secretKey = $('secretKey').value.trim();

  $('endpoint').value = state.endpoint;
  $('region').value = state.region;

  if (!state.accessKey || !state.secretKey) {
    showError('Access key and secret key are required');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Connecting...';

  try {
    const resp = await signAndFetch('GET', '/');
    if (!resp.ok) {
      const txt = await resp.text();
      showError('Connection failed: ' + resp.status + ' ' + (txt || resp.statusText));
      btn.disabled = false;
      btn.textContent = 'Connect';
      return;
    }
    await showBucketsAfterConnect();
    saveState();
  } catch (e) {
    showError('Connection error: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Connect';
  }
}

async function showBucketsAfterConnect() {
  $('login-panel').style.display = 'none';
  $('browser').classList.add('visible');
  $('status').textContent = 'Connected';
  $('status').classList.add('connected');
  state.bucket = '';
  state.prefix = '';
  renderBreadcrumb();
  await loadBuckets();
}

async function loadBuckets() {
  showLoading();
  try {
    const resp = await signAndFetch('GET', '/');
    const xml = await resp.text();
    if (!resp.ok) throw new Error(resp.status + ' ' + xml);
    const buckets = parseListBucketsXML(xml);
    hideLoading();
    renderBuckets(buckets);
  } catch (e) {
    hideLoading();
    showEmpty();
    showError(e.message);
  }
}

function renderBuckets(buckets) {
  const tbody = $('objects-tbody');
  tbody.innerHTML = '';
  $('objects-table').classList.remove('hidden');
  $('empty-state').classList.add('hidden');

  if (!buckets.length) {
    $('objects-table').classList.add('hidden');
    $('empty-state').classList.remove('hidden');
    return;
  }

  for (const b of buckets) {
    const tr = document.createElement('tr');
    tr.className = 'clickable';
    tr.onclick = () => openBucket(b.name);
    tr.innerHTML =
      '<td class="name"><span class="icon">' + folderIcon() + '</span><span class="folder-name">' +
      escapeHtml(b.name) + '</span></td>' +
      '<td class="size"></td>' +
      '<td class="date">' + formatDate(b.date) + '</td>';
    tbody.appendChild(tr);
  }
}

async function openBucket(name) {
  state.bucket = name;
  state.prefix = '';
  renderBreadcrumb();
  saveState();
  await loadObjects();
}

async function navigatePrefix(prefix) {
  state.prefix = decodeURIComponent(prefix);
  renderBreadcrumb();
  saveState();
  await loadObjects();
}

async function loadObjects() {
  showLoading();
  const query = { 'delimiter': '/' };
  if (state.prefix) query['prefix'] = state.prefix;
  try {
    const resp = await signAndFetch('GET', '/' + state.bucket, query);
    const xml = await resp.text();
    if (!resp.ok) throw new Error(resp.status + ' ' + xml);
    const result = parseListObjectsXML(xml);
    hideLoading();
    renderObjects(result.folders, result.files);
  } catch (e) {
    hideLoading();
    showEmpty();
    console.error(e);
  }
}

function renderObjects(folders, files) {
  const tbody = $('objects-tbody');
  tbody.innerHTML = '';
  $('objects-table').classList.remove('hidden');
  $('empty-state').classList.add('hidden');

  if (!folders.length && !files.length) {
    $('objects-table').classList.add('hidden');
    $('empty-state').classList.remove('hidden');
    return;
  }

  for (const f of folders) {
    const displayName = f.replace(state.prefix, '').replace(/\/$/, '');
    const tr = document.createElement('tr');
    tr.className = 'clickable';
    tr.onclick = () => navigatePrefix(f);
    tr.innerHTML =
      '<td class="name"><span class="icon">' + folderIcon() + '</span><span class="folder-name">' +
      escapeHtml(displayName) + '</span></td>' +
      '<td class="size"></td>' +
      '<td class="date"></td>';
    tbody.appendChild(tr);
  }

  for (const f of files) {
    const displayName = f.key.replace(state.prefix, '');
    if (!displayName || displayName === state.prefix) continue;
    const tr = document.createElement('tr');
    tr.className = 'clickable';
    tr.onclick = (e) => downloadFile(f.key, e);
    tr.innerHTML =
      '<td class="name"><span class="icon">' + fileIcon(f.key) + '</span><span>' +
      escapeHtml(displayName) + '</span></td>' +
      '<td class="size">' + formatSize(f.size) + '</td>' +
      '<td class="date">' + formatDate(f.modified) + '</td>';
    tbody.appendChild(tr);
  }
}

async function downloadFile(key, event) {
  const url = await presignedUrl(state.bucket, key, 300);
  window.open(url, '_blank');
}

function showBuckets() {
  state.bucket = '';
  state.prefix = '';
  renderBreadcrumb();
  saveState();
  loadBuckets();
}

function logout() {
  state.accessKey = '';
  state.secretKey = '';
  state.bucket = '';
  state.prefix = '';
  localStorage.removeItem('s3browser');

  $('browser').classList.remove('visible');
  $('login-panel').style.display = '';
  $('connect-btn').disabled = false;
  $('connect-btn').textContent = 'Connect';
  $('accessKey').value = '';
  $('secretKey').value = '';
  $('status').classList.remove('connected');
  $('status').textContent = '';
}

function autoConnect() {
  loadState();
  if (!state.accessKey || !state.secretKey) {
    $('endpoint').value = window.location.origin;
    return;
  }

  $('endpoint').value = state.endpoint || window.location.origin;
  $('region').value = state.region || 'us-east-1';
  $('accessKey').value = state.accessKey;
  $('secretKey').value = state.secretKey;

  $('login-panel').style.display = 'none';
  $('browser').classList.add('visible');
  $('status').textContent = 'Reconnecting...';
  $('status').classList.add('connected');

  loadState();
  if (state.bucket) {
    renderBreadcrumb();
    loadObjects();
  } else {
    loadBuckets();
  }
}

autoConnect();
</script>
</body>
</html>
